<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知域 — Gemini V2 设计稿</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
.zhy-shadow { box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.08); }
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">

// ── 内联 SVG 图标 ──
const Icons = {
  Compass: ({ size, color, sw }) => (
    <svg width={size||18} height={size||18} viewBox="0 0 24 24" fill="none" stroke={color||'#b0a090'} strokeWidth={sw||1.6} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
    </svg>
  ),
  Star: ({ size, color, sw }) => (
    <svg width={size||18} height={size||18} viewBox="0 0 24 24" fill="none" stroke={color||'#b0a090'} strokeWidth={sw||1.6} strokeLinecap="round" strokeLinejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
  ),
  MapPin: ({ size, color, sw }) => (
    <svg width={size||18} height={size||18} viewBox="0 0 24 24" fill="none" stroke={color||'#b0a090'} strokeWidth={sw||1.6} strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
    </svg>
  ),
  User: ({ size, color, sw }) => (
    <svg width={size||18} height={size||18} viewBox="0 0 24 24" fill="none" stroke={color||'#b0a090'} strokeWidth={sw||1.6} strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
  ),
  Heart: ({ size, color, sw, fill }) => (
    <svg width={size||14} height={size||14} viewBox="0 0 24 24" fill={fill||'none'} stroke={color||'#c8823a'} strokeWidth={sw||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  ),
  Bookmark: ({ size, color, sw, fill }) => (
    <svg width={size||14} height={size||14} viewBox="0 0 24 24" fill={fill||'none'} stroke={color||'#9a7050'} strokeWidth={sw||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
  ),
  Share2: ({ size, color, sw }) => (
    <svg width={size||10} height={size||10} viewBox="0 0 24 24" fill="none" stroke={color||'#8a5520'} strokeWidth={sw||1.8} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
  ),
  Sparkles: ({ size, color, sw }) => (
    <svg width={size||13} height={size||13} viewBox="0 0 24 24" fill="none" stroke={color||'#c8823a'} strokeWidth={sw||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    </svg>
  ),
  Layers: ({ size, color, sw }) => (
    <svg width={size||9} height={size||9} viewBox="0 0 24 24" fill="none" stroke={color||'#b0a090'} strokeWidth={sw||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="m12 3-9 5 9 5 9-5-9-5Z"/><path d="m12 8 9 5-9 5-9-5 9-5Z"/>
    </svg>
  ),
  Grid3X3: ({ size, color, sw }) => (
    <svg width={size||9} height={size||9} viewBox="0 0 24 24" fill="none" stroke={color||'#b0a090'} strokeWidth={sw||1.8} strokeLinecap="round" strokeLinejoin="round">
      <rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
    </svg>
  ),
  ChevronRight: ({ size, color, sw }) => (
    <svg width={size||11} height={size||11} viewBox="0 0 24 24" fill="none" stroke={color||'#c8823a'} strokeWidth={sw||2} strokeLinecap="round" strokeLinejoin="round">
      <path d="m9 18 6-6-6-6"/>
    </svg>
  ),
};

// ── 手机外壳 ──
function PhoneFrame({ children, label }) {
  return (
    <div className="flex flex-col items-center gap-3">
      <div className="relative zhy-shadow overflow-hidden" style={{ width:220, height:476, background:'#1a1210', border:'6px solid #2c2118', borderRadius:'2.8rem', flexShrink:0 }}>
        <div className="absolute top-0 left-1/2 z-50 rounded-b-2xl" style={{ width:72, height:22, background:'#1a1210', transform:'translateX(-50%)' }}/>
        <div className="w-full h-full overflow-hidden" style={{ borderRadius:'2.2rem' }}>{children}</div>
      </div>
      <span className="text-xs font-medium tracking-wide" style={{ color:'#7a6a58' }}>{label}</span>
    </div>
  );
}

// ── 状态栏 ──
function StatusBar({ dark = false }) {
  const c = dark ? 'rgba(255,255,255,0.85)' : '#2c2118';
  return (
    <div className="flex items-center justify-between px-5" style={{ paddingTop:26, paddingBottom:4 }}>
      <span style={{ color:c, fontSize:10, fontWeight:600 }}>9:41</span>
      <div className="flex items-center gap-1">
        <div className="flex items-end gap-px" style={{ height:9 }}>
          {[3,5,7,9].map((h,i) => <div key={i} className="rounded-sm" style={{ width:2.5, height:h, background:c, opacity:i<3?1:0.35 }}/>)}
        </div>
        <div className="rounded-sm flex items-center" style={{ width:17, height:8, border:`1.2px solid ${c}`, padding:1 }}>
          <div className="rounded-sm" style={{ width:'75%', height:4, background:c }}/>
        </div>
      </div>
    </div>
  );
}

// ── 底部导航 ──
function BottomNav({ active = 0 }) {
  const tabs = [
    { Icon: Icons.Compass, label:'发现' }, { Icon: Icons.Star, label:'收藏' },
    { Icon: Icons.MapPin, label:'附近圈' }, { Icon: Icons.User, label:'我的' },
  ];
  return (
    <div className="flex items-center justify-around pt-2 pb-1" style={{ background:'#fff9f3', borderTop:'1px solid rgba(200,130,58,0.12)', height:54 }}>
      {tabs.map((t,i) => {
        const a = i === active;
        return (
          <div key={i} className="flex flex-col items-center gap-0.5 flex-1">
            <t.Icon size={18} color={a ? '#c8823a' : '#b0a090'} sw={a ? 2.2 : 1.6} />
            <span style={{ fontSize:9, color:a?'#c8823a':'#b0a090', fontWeight:a?600:400 }}>{t.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── 顶部模式切换 ──
function TopBar({ mode = 'immersive' }) {
  return (
    <div className="flex items-center justify-between px-4 py-2">
      <div className="flex items-center gap-1.5">
        <Icons.Sparkles size={13} color="#c8823a" />
        <span style={{ fontSize:14, fontWeight:700, color:'#2c2118', letterSpacing:'0.04em' }}>知域</span>
      </div>
      <div className="flex items-center rounded-full overflow-hidden" style={{ background:'rgba(200,130,58,0.1)', padding:2, gap:1 }}>
        <div className="rounded-full flex items-center gap-1 px-2.5 py-1" style={{ background: mode==='immersive'?'#c8823a':'transparent', transition:'background 0.2s' }}>
          <Icons.Layers size={9} color={mode==='immersive'?'#fff':'#b0a090'} />
          <span style={{ fontSize:9, color:mode==='immersive'?'#fff':'#b0a090', fontWeight:mode==='immersive'?600:400 }}>沉浸</span>
        </div>
        <div className="rounded-full flex items-center gap-1 px-2.5 py-1" style={{ background: mode==='discover'?'#c8823a':'transparent' }}>
          <Icons.Grid3X3 size={9} color={mode==='discover'?'#fff':'#b0a090'} />
          <span style={{ fontSize:9, color:mode==='discover'?'#fff':'#b0a090', fontWeight:mode==='discover'?600:400 }}>发现</span>
        </div>
      </div>
    </div>
  );
}

// ── Screen 1：章鱼沉浸 ──
function Screen1() {
  return (
    <div className="w-full h-full flex flex-col" style={{ background:'#fdf6ee' }}>
      <StatusBar /><TopBar mode="immersive" />
      <div className="flex-1 flex flex-col items-center justify-center px-3 pb-1">
        <div className="w-full" style={{ height:12, background:'#edd9b5', marginBottom:-8, opacity:0.5, transform:'scaleX(0.93)', borderRadius:'20px 20px 0 0' }}/>
        <div className="w-full" style={{ height:10, background:'#e8d0a4', marginBottom:-6, opacity:0.35, transform:'scaleX(0.96)', borderRadius:'18px 18px 0 0' }}/>
        <div className="w-full rounded-3xl relative overflow-hidden" style={{ background:'linear-gradient(145deg, #f5e6c8 0%, #ecd5a8 60%, #e4c98a 100%)', boxShadow:'0 8px 28px rgba(44,33,24,0.14)', minHeight:280, border:'1px solid rgba(220,180,100,0.35)' }}>
          <div className="absolute top-0 right-0 w-28 h-28 rounded-full opacity-20" style={{ background:'radial-gradient(circle, #c8823a 0%, transparent 70%)', transform:'translate(30%, -30%)' }}/>
          <div className="relative z-10 p-5">
            <div className="flex items-center gap-1.5 mb-3">
              <span className="px-2 py-0.5 rounded-full text-xs" style={{ background:'rgba(200,130,58,0.18)', color:'#8a5520', fontSize:9 }}>🐙 生物</span>
              <span className="px-2 py-0.5 rounded-full text-xs" style={{ background:'rgba(200,130,58,0.12)', color:'#a06030', fontSize:9 }}>反直觉</span>
            </div>
            <h2 className="font-bold mb-3" style={{ fontSize:14, color:'#2c2118', lineHeight:1.5 }}>章鱼有三颗心脏，游泳时主心脏会停止跳动</h2>
            <div style={{ height:1, background:'rgba(200,130,58,0.2)', marginBottom:10 }}/>
            <p style={{ fontSize:10.5, color:'#5a4030', lineHeight:1.65 }}>章鱼拥有三颗心脏：一颗主心脏负责全身供血，另外两颗鳃心负责将血液泵送通过鳃部完成氧合。当章鱼游动时，主心脏会暂时停止跳动——这也是为什么它们更喜欢爬行而非游泳。</p>
            <div className="mt-3 rounded-2xl p-2.5 flex items-start gap-2" style={{ background:'rgba(200,130,58,0.1)', border:'1px solid rgba(200,130,58,0.2)' }}>
              <span style={{ fontSize:14 }}>💡</span>
              <p style={{ fontSize:9.5, color:'#7a5030', lineHeight:1.5 }}>章鱼的血液是蓝色的，含有血蓝蛋白而非血红蛋白，因此在低温环境中携氧效率更高。</p>
            </div>
            <div className="flex items-center justify-between mt-4">
              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1"><Icons.Heart size={14} color="#c8823a"/><span style={{ fontSize:9.5, color:'#9a7050' }}>2.4k</span></div>
                <div className="flex items-center gap-1"><Icons.Bookmark size={14} color="#9a7050"/><span style={{ fontSize:9.5, color:'#9a7050' }}>831</span></div>
              </div>
              <div className="flex items-center gap-1 px-2.5 py-1 rounded-full" style={{ background:'rgba(200,130,58,0.15)', border:'1px solid rgba(200,130,58,0.25)' }}>
                <Icons.Share2 size={10} color="#8a5520"/><span style={{ fontSize:9, color:'#8a5520', fontWeight:500 }}>分享</span>
              </div>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-1.5 mt-3">
          <div className="w-1.5 h-1.5 rounded-full" style={{ background:'#c8823a' }}/>
          <div className="w-4 h-1 rounded-full" style={{ background:'rgba(200,130,58,0.3)' }}/>
          <div className="w-1.5 h-1.5 rounded-full" style={{ background:'rgba(200,130,58,0.2)' }}/>
        </div>
        <p style={{ fontSize:8.5, color:'#b0a090', marginTop:4 }}>← 左右滑动切换 →</p>
      </div>
      <BottomNav active={0}/>
    </div>
  );
}

// ── Screen 2：宇宙沉浸 ──
function Screen2() {
  return (
    <div className="w-full h-full flex flex-col" style={{ background:'#f0eef8' }}>
      <StatusBar /><TopBar mode="immersive"/>
      <div className="flex-1 flex flex-col items-center justify-center px-3 pb-1">
        <div className="w-full" style={{ height:10, background:'#c5c0dc', marginBottom:-7, opacity:0.4, transform:'scaleX(0.93)', borderRadius:'18px 18px 0 0' }}/>
        <div className="w-full" style={{ height:10, background:'#d0cce6', marginBottom:-6, opacity:0.3, transform:'scaleX(0.96)', borderRadius:'18px 18px 0 0' }}/>
        <div className="w-full rounded-3xl relative overflow-hidden" style={{ background:'linear-gradient(145deg, #1e1b3a 0%, #2d2850 50%, #1a1630 100%)', boxShadow:'0 10px 36px rgba(30,27,58,0.4)', minHeight:280, border:'1px solid rgba(160,150,220,0.2)' }}>
          {[{t:12,l:20,s:1.5},{t:25,l:80,s:1},{t:8,l:140,s:2},{t:40,l:60,s:1.5},{t:55,l:155,s:1},{t:18,l:110,s:1},{t:70,l:30,s:2},{t:50,l:120,s:1.5},{t:35,l:170,s:1}].map((st,i) =>
            <div key={i} className="absolute rounded-full" style={{ top:st.t, left:st.l, width:st.s, height:st.s, background:`rgba(255,255,255,${0.4+Math.random()*0.4})` }}/>
          )}
          <div className="absolute rounded-full opacity-30" style={{ background:'radial-gradient(circle, #9b7ef8 0%, #6b4fd8 30%, transparent 70%)', width:100, height:100, top:-20, right:-10 }}/>
          <div className="absolute rounded-full opacity-20" style={{ background:'radial-gradient(circle, #f8a87e 0%, transparent 70%)', width:80, height:80, bottom:20, left:-20 }}/>
          <div className="relative z-10 p-5">
            <div className="flex items-center gap-1.5 mb-3">
              <span className="px-2 py-0.5 rounded-full" style={{ background:'rgba(155,126,248,0.25)', color:'#c4b0ff', fontSize:9 }}>🌌 宇宙</span>
              <span className="px-2 py-0.5 rounded-full" style={{ background:'rgba(155,126,248,0.15)', color:'#a898e8', fontSize:9 }}>物理</span>
            </div>
            <h2 className="font-bold mb-3" style={{ fontSize:14, color:'#f0eeff', lineHeight:1.5 }}>你身体里的铁和钙，全部来自远古超新星爆发</h2>
            <div style={{ height:1, background:'rgba(155,126,248,0.2)', marginBottom:10 }}/>
            <p style={{ fontSize:10.5, color:'#b8b0d8', lineHeight:1.65 }}>宇宙大爆炸只产生了氢和氦。所有更重的元素——包括你血液中的铁、骨骼里的钙——都是在恒星内部核聚变或超新星爆炸中锻造的，再通过爆炸散布到星际空间。</p>
            <div className="mt-3 rounded-2xl p-2.5 flex items-start gap-2" style={{ background:'rgba(155,126,248,0.1)', border:'1px solid rgba(155,126,248,0.2)' }}>
              <span style={{ fontSize:14 }}>✨</span>
              <p style={{ fontSize:9.5, color:'#a898d8', lineHeight:1.5 }}>卡尔·萨根说过：「我们都是星尘。」这不是比喻，而是字面意义上的真实。</p>
            </div>
            <div className="flex items-center justify-between mt-4">
              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1"><Icons.Heart size={14} color="#c4a0ff"/><span style={{ fontSize:9.5, color:'#a898d8' }}>5.1k</span></div>
                <div className="flex items-center gap-1"><Icons.Bookmark size={14} color="#a898d8"/><span style={{ fontSize:9.5, color:'#a898d8' }}>1.8k</span></div>
              </div>
              <div className="flex items-center gap-1 px-2.5 py-1 rounded-full" style={{ background:'rgba(155,126,248,0.2)', border:'1px solid rgba(155,126,248,0.3)' }}>
                <Icons.Share2 size={10} color="#c4b0ff"/><span style={{ fontSize:9, color:'#c4b0ff', fontWeight:500 }}>分享</span>
              </div>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-1.5 mt-3">
          <div className="w-1.5 h-1.5 rounded-full" style={{ background:'rgba(155,126,248,0.3)' }}/>
          <div className="w-4 h-1 rounded-full" style={{ background:'#9b7ef8' }}/>
          <div className="w-1.5 h-1.5 rounded-full" style={{ background:'rgba(155,126,248,0.3)' }}/>
        </div>
        <p style={{ fontSize:8.5, color:'#9890b8', marginTop:4 }}>← 左右滑动切换 →</p>
      </div>
      <BottomNav active={0}/>
    </div>
  );
}

// ── 发现模式小卡片 ──
function MiniCard({ bg, tagBg, tagColor, tag, title, count }) {
  return (
    <div className="rounded-2xl p-3 relative overflow-hidden" style={{ background:bg, boxShadow:'0 4px 14px rgba(44,33,24,0.1)', flex:'1 1 0', minHeight:118, border:'1px solid rgba(255,255,255,0.5)' }}>
      <div className="absolute top-0 right-0 w-12 h-12 rounded-full opacity-20" style={{ background:'radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%)', transform:'translate(30%, -30%)' }}/>
      <span className="px-1.5 py-0.5 rounded-full block mb-2" style={{ background:tagBg, color:tagColor, fontSize:8, width:'fit-content' }}>{tag}</span>
      <p className="font-semibold" style={{ fontSize:10.5, color:'#2c2118', lineHeight:1.45 }}>{title}</p>
      <div className="flex items-center gap-1 mt-2 absolute bottom-2.5 right-3">
        <Icons.Heart size={9} color="#b0a090"/><span style={{ fontSize:8, color:'#b0a090' }}>{count}</span>
      </div>
    </div>
  );
}

// ── Screen 3：发现模式 ──
function Screen3() {
  const cards = [
    { bg:'linear-gradient(135deg, #f5e6c8 0%, #edd0a0 100%)', tagBg:'rgba(200,130,58,0.18)', tagColor:'#8a5520', tag:'🐙 生物', title:'章鱼有三颗心脏，游泳时主心脏会停跳', count:'2.4k' },
    { bg:'linear-gradient(135deg, #dce8f0 0%, #c8dce8 100%)', tagBg:'rgba(70,130,180,0.18)', tagColor:'#2a6090', tag:'🌌 宇宙', title:'你体内的铁与钙来自远古超新星爆发', count:'5.1k' },
    { bg:'linear-gradient(135deg, #d0ebe8 0%, #b8d8d4 100%)', tagBg:'rgba(40,160,140,0.18)', tagColor:'#1a7060', tag:'🐸 动物', title:'青蛙会把胃翻出来清洗再塞回去', count:'3.7k' },
    { bg:'linear-gradient(135deg, #f0dce8 0%, #e0c8d8 100%)', tagBg:'rgba(180,80,130,0.18)', tagColor:'#8a3060', tag:'🧠 神经', title:'人脑的存储容量相当于250万GB', count:'4.2k' },
  ];
  return (
    <div className="w-full h-full flex flex-col" style={{ background:'#fdf6ee' }}>
      <StatusBar /><TopBar mode="discover"/>
      <div className="flex items-center justify-between px-4 pb-2">
        <span style={{ fontSize:11, fontWeight:600, color:'#2c2118' }}>今日精选</span>
        <div className="flex items-center gap-0.5">
          <Icons.ChevronRight size={11} color="#c8823a"/><span style={{ fontSize:9, color:'#c8823a' }}>全部</span>
        </div>
      </div>
      <div className="flex-1 px-3 overflow-hidden">
        <div className="flex gap-2.5 mb-2.5"><MiniCard {...cards[0]}/><MiniCard {...cards[1]}/></div>
        <div className="flex gap-2.5 mb-2.5"><MiniCard {...cards[2]}/><MiniCard {...cards[3]}/></div>
        <div className="flex items-center gap-1.5 mb-2"><span style={{ fontSize:10, fontWeight:600, color:'#2c2118' }}>浏览分类</span></div>
        <div className="flex gap-2 overflow-hidden">
          {['🐋 海洋','🔬 科学','🏛 历史','🌿 植物'].map((cat,i) =>
            <div key={i} className="px-2.5 py-1.5 rounded-xl whitespace-nowrap flex-shrink-0" style={{ background:i===0?'#c8823a':'rgba(200,130,58,0.1)', border:`1px solid ${i===0?'#c8823a':'rgba(200,130,58,0.2)'}` }}>
              <span style={{ fontSize:9, color:i===0?'#fff':'#8a6040', fontWeight:i===0?600:400 }}>{cat}</span>
            </div>
          )}
        </div>
      </div>
      <BottomNav active={0}/>
    </div>
  );

// ── Screen 4：交互状态 ──
function Screen4() {
  return (
    <div className="w-full h-full flex flex-col relative" style={{ background:'#fdf6ee' }}>
