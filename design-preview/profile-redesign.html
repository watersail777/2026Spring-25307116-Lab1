<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>知域 · 我的</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #f5f4f0;
    --card-bg: #fffdf9;
    --text: #2a2520;
    --text-sub: #6b6358;
    --text-dim: #a09888;
    --ring-read: #5b8cbf;
    --ring-save: #c4945a;
    --ring-week: #6b9e78;
    --shadow-sm: 0 2px 8px rgba(120,100,70,0.06);
    --shadow-card: 0 4px 20px rgba(120,100,70,0.08), 0 -1px 3px rgba(255,255,255,0.6);
  }

  body {
    background: #e8e4da;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh; font-family:'Noto Sans SC', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 390px; max-height: 850px; background: var(--bg);
    border-radius: 40px; overflow-y: auto; overflow-x: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.12), 0 0 0 2px #e0ded6;
    display:flex; flex-direction:column; position:relative;
    scroll-behavior: smooth;
  }
  .phone::-webkit-scrollbar { display:none; }

  /* ── 状态栏 ── */
  .status-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 24px 4px; font-size:12px; font-weight:600; color: rgba(255,255,255,0.85);
    position:relative; z-index:3;
  }

  /* ── 动态渐变头部 ── */
  .header-gradient {
    position:relative; overflow:hidden;
    background: linear-gradient(155deg, #d4855e 0%, #c97a6a 15%, #b8686e 30%, #9b5e78 50%, #7d5588 70%, #6b4d92 100%);
    padding: 28px 24px 36px;
  }
  .header-gradient::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 20% 30%, rgba(255,220,180,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(200,160,220,0.2) 0%, transparent 50%);
  }
  .header-gradient::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--bg));
  }

  .header-content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; }

  .avatar-ring {
    width: 72px; height: 72px; border-radius:50%; position:relative;
    background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.1));
    padding:3px; margin-bottom:14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .avatar-ring svg { position:absolute; top:-6px; left:-6px; width:84px; height:84px; transform:rotate(-90deg); }
  .avatar-ring .ring-bg { fill:none; stroke:rgba(255,255,255,0.2); stroke-width:3; }
  .avatar-ring .ring-fg { fill:none; stroke:rgba(255,255,255,0.7); stroke-width:3; stroke-linecap:round;
    stroke-dasharray: 264; stroke-dashoffset: 66; transition: stroke-dashoffset 1.5s ease; }

  .avatar-inner {
    width:66px; height:66px; border-radius:50%; overflow:hidden; position:relative; z-index:1;
    background: linear-gradient(135deg, #f0d5c0, #e8c8b0);
    display:flex; align-items:center; justify-content:center; font-size:32px;
  }

  .nickname { font-family:'Noto Serif SC', serif; font-size:22px; font-weight:700; color:#fff; letter-spacing:.06em; margin-bottom:4px; }
  .tagline { font-size:13px; font-weight:300; color:rgba(255,255,255,0.75); letter-spacing:.04em; }

  /* ── 统计卡片（浮在渐变之上）── */
  .stats-card {
    position:relative; z-index:3; margin: -18px 16px 0;
    display:flex; justify-content:space-around; align-items:center;
    background: var(--card-bg); border-radius:20px;
    box-shadow: var(--shadow-card);
    padding: 10px 8px;
    border: 1px solid rgba(255,255,255,0.6);
  }
  .stat-item { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
  .stat-num { font-family:'Noto Serif SC', serif; font-size:24px; font-weight:700; color:#3a3028; }
  .stat-label { font-size:11px; color:var(--text-dim); letter-spacing:.03em; }
  .stat-divider { width:1px; height:32px; background:#e8e4dc; }

  /* ── 环形图区域 ── */
  .rings-section { padding: 20px 16px 8px; }

  .section-title-row {
    display:flex; align-items:center; gap:8px; margin-bottom:14px;
  }
  .section-title-row span { font-size:13px; font-weight:600; color:var(--text-sub); letter-spacing:.04em; }
  .section-title-row::before {
    content:''; width:3px; height:14px; border-radius:2px;
    background: linear-gradient(180deg, #d4855e, #7d5588);
  }

  .rings-row {
    display:flex; justify-content:space-around; gap:10px;
  }

  .ring-card {
    background: #fffdf9; border-radius:18px; padding:14px 12px 12px;
    display:flex; flex-direction:column; align-items:center;
    box-shadow: var(--shadow-sm); border:1px solid rgba(255,255,255,0.5);
    flex:1; position:relative;
  }
  .ring-card::after {
    content:''; position:absolute; top:0; left:12px; right:12px; height:1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  }

  .ring-svg-wrap { position:relative; width:64px; height:64px; margin-bottom:6px; }
  .ring-svg-wrap svg { transform:rotate(-90deg); }
  .ring-center-num {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif SC', serif; font-size:16px; font-weight:700;
  }

  .ring-label { font-size:10px; color:var(--text-dim); letter-spacing:.04em; text-align:center; }

  /* ── 设置列表 ── */
  .settings-section { padding: 8px 16px 16px; }

  .setting-row {
    display:flex; align-items:center; justify-content:space-between;
    background: var(--card-bg); border-radius:16px; padding:14px 16px;
    box-shadow: var(--shadow-sm); border:1px solid rgba(255,255,255,0.5);
    margin-bottom:8px; cursor:pointer; transition: transform .15s;
  }
  .setting-row:active { transform:scale(.98); }
  .setting-row .left { display:flex; align-items:center; gap:12px; }
  .setting-icon {
    width:28px; height:28px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .setting-label { font-size:15px; font-weight:500; color:var(--text); }
  .setting-chevron { font-size:14px; color:var(--text-dim); }

  .setting-icon.palette { background:#f0e6f4; }
  .setting-icon.bell { background:#e6f0e6; }
  .setting-icon.sliders { background:#f6f0e0; }
  .setting-icon.info { background:#f4e6e4; }

  /* toggle switch */
  .toggle {
    width:44px; height:24px; border-radius:12px; background:#7dbe7d; position:relative;
    display:flex; align-items:center; padding:0 2px; justify-content:flex-end;
  }
  .toggle::after {
    content:''; width:20px; height:20px; border-radius:10px;
    background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.12);
  }

  @media (max-width:420px) {
    .phone { width:100%; border-radius:0; max-height:none; }
  }
</style>
</head>
<body>
<div class="phone">

  <!-- 状态栏 -->
  <div class="status-bar">
    <span>9:41</span>
    <span>我的</span>
    <span style="opacity:.5;">⚙</span>
  </div>

  <!-- 渐变头部 -->
  <div class="header-gradient">
    <div class="header-content">
      <div class="avatar-ring">
        <svg viewBox="0 0 84 84"><circle class="ring-bg" cx="42" cy="42" r="39"/><circle class="ring-fg" cx="42" cy="42" r="39"/></svg>
        <div class="avatar-inner">🐼</div>
      </div>
      <div class="nickname">知小域</div>
      <div class="tagline">好奇心是最好的老师</div>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-card">
    <div class="stat-item">
      <span class="stat-num" id="readCount">142</span>
      <span class="stat-label">已阅读</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="saveCount">24</span>
      <span class="stat-label">已收藏</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="streakCount">7</span>
      <span class="stat-label">连续天数</span>
    </div>
  </div>

  <!-- 阅读环 -->
  <div class="rings-section">
    <div class="section-title-row"><span>阅读统计</span></div>
    <div class="rings-row">

      <!-- 已阅读 -->
      <div class="ring-card">
        <div class="ring-svg-wrap">
          <svg viewBox="0 0 64 64" width="64" height="64">
            <circle cx="32" cy="32" r="28" fill="none" stroke="#e8e4dc" stroke-width="5"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke="#5b8cbf" stroke-width="5"
              stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="52" id="ring1"/>
          </svg>
          <div class="ring-center-num" style="color:#5b8cbf;">70%</div>
        </div>
        <span class="ring-label">已阅读</span>
      </div>

      <!-- 已收藏 -->
      <div class="ring-card">
        <div class="ring-svg-wrap">
          <svg viewBox="0 0 64 64" width="64" height="64">
            <circle cx="32" cy="32" r="28" fill="none" stroke="#e8e4dc" stroke-width="5"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke="#c4945a" stroke-width="5"
              stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="95" id="ring2"/>
          </svg>
          <div class="ring-center-num" style="color:#c4945a;">46%</div>
        </div>
        <span class="ring-label">收藏率</span>
      </div>

      <!-- 本周活跃 -->
      <div class="ring-card">
        <div class="ring-svg-wrap">
          <svg viewBox="0 0 64 64" width="64" height="64">
            <circle cx="32" cy="32" r="28" fill="none" stroke="#e8e4dc" stroke-width="5"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke="#6b9e78" stroke-width="5"
              stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="25" id="ring3"/>
          </svg>
          <div class="ring-center-num" style="color:#6b9e78;">6/7</div>
        </div>
        <span class="ring-label">本周活跃</span>
      </div>

    </div>
  </div>

  <!-- 设置列表 -->
  <div class="settings-section">
    <div class="section-title-row"><span>偏好设置</span></div>

    <div class="setting-row">
      <div class="left">
        <div class="setting-icon palette">🎨</div>
        <span class="setting-label">卡片配色主题</span>
      </div>
      <span class="setting-chevron">›</span>
    </div>

    <div class="setting-row">
      <div class="left">
        <div class="setting-icon bell">🔔</div>
        <span class="setting-label">每日推送提醒</span>
      </div>
      <div class="toggle"></div>
    </div>

    <div class="setting-row">
      <div class="left">
        <div class="setting-icon sliders">🎚</div>
        <span class="setting-label">知识难度偏好</span>
      </div>
      <span class="setting-chevron">›</span>
    </div>

    <div class="section-title-row"><span>关于</span></div>

    <div class="setting-row">
      <div class="left">
        <div class="setting-icon info">ℹ</div>
        <span class="setting-label">关于知域</span>
      </div>
      <span class="setting-chevron">›</span>
    </div>
  </div>

</div>

<script>
// 环形图动画
document.querySelectorAll('[id^="ring"]').forEach(ring => {
  const offset = ring.getAttribute('stroke-dashoffset');
  ring.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
  requestAnimationFrame(() => { ring.setAttribute('stroke-dashoffset', offset); });
});

// 设置行按下反馈
document.querySelectorAll('.setting-row').forEach(row => {
  row.addEventListener('click', function() {
    this.style.transform = 'scale(0.97)';
    setTimeout(() => { this.style.transform = ''; }, 150);
  });
});
</script>
</body>
</html>
